---
- name: Setup Kubernetes Environment
  hosts: all
  become: yes
  become_method: sudo
  gather_facts: yes
  tasks:
    - name: Remove generated ubuntu hosts
      lineinfile:
        path: /etc/hosts
        regexp: "ubuntu-*"
        state: absent
        backup: yes

    - name: Remove generated hosts
      lineinfile:
        path: /etc/hosts
        regexp: ".* {{ hostvars[item]['ansible_hostname']}} {{ hostvars[item]['ansible_hostname']}}"
        state: absent
        backup: yes
      loop: "{{ ansible_play_batch }}"

    - name: Update hosts
      lineinfile:
        path: /etc/hosts
        regexp: ".*\t{{ hostvars[item]['ansible_hostname']}}\t{{ hostvars[item]['ansible_hostname']}}$"
        line: "{{ hostvars[item]['ansible_ssh_host'] }}\t{{ hostvars[item]['ansible_hostname']}}\t{{ hostvars[item]['ansible_hostname']}}.local"
        state: present
        backup: yes
      loop: "{{ ansible_play_batch }}"

    - name: Install packages that allow apt to be used over HTTPS
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg-agent
          - software-properties-common
        state: present
        update_cache: yes

    - name: Add an apt signing key for Docker
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add apt repository for stable version
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable
        state: present

    - name: Install docker and dependencies
      apt: 
        name:
          - docker-ce 
          - docker-ce-cli 
          - containerd.io
        state: present
        update_cache: yes
      notify: Check docker status

    - name: Configure containerd config
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
      with_items:
        - { src: config.toml, dest: /etc/containerd/config.toml }

    - name: Reload systemd daemon
      command: systemctl daemon-reload

    - name: Enable and start containerd
      service:
        name: containerd
        state: restarted
        enabled: yes

    - name: Add current user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes
    
    - name: Remove swapfile from /etc/fstab
      mount:
        name: "{{ item }}"
        fstype: swap
        state: absent
      with_items:
        - swap
        - none

    - name: Disable swap
      command: swapoff -a
      when: ansible_swaptotal_mb > 0
    
    - name: Ensure apt keyrings directory exists
      file:
        path: /etc/apt/keyrings
        state: directory

    - name: Delete kubernetes keyrings if exists
      file:
        path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        state: absent
    
    - name: Add kubernetes APT repository key
      shell: >
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key | sudo gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    
    - name: Add kubernetes repository to sources list
      apt_repository:
        repo: deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /
        state: present
        filename: kubernetes
        update_cache: yes

    - name: Install Kubernetes binaries
      apt: 
        name:
          - kubelet=1.29.*
          - kubeadm=1.29.*
          - kubectl=1.29.*
        state: present
        update_cache: yes

    - name: Ensure /etc/default/kubelet exists
      file:
        path: /etc/default/kubelet
        state: touch

    - name: Configure node ip
      lineinfile:
        path: /etc/default/kubelet
        line: KUBELET_EXTRA_ARGS=--node-ip={{ node_ip }}
        state: present

    - name: Restart kubelet
      service:
        name: kubelet
        state: restarted
        daemon_reload: yes
        enabled: yes


    - name: Update apt package list
      apt:
        update_cache: yes

    - name: Upgrade all apt packages
      apt:
        upgrade: dist

    - name: Ensure necessary packages are installed
      apt:
        name:
          - git
          - make
          - gcc
        state: present
      become: true

    - name: Clone gtp5g repository
      git:
        repo: https://github.com/free5gc/gtp5g.git
        dest: gtp5g
        update: yes

    - name: Clean and build gtp5g
      shell: make clean && make
      args:
        chdir: gtp5g

    - name: Install gtp5g
      shell: make install
      args:
        chdir: gtp5g
      become: true


  handlers:
    - name: Check docker status
      service:
        name: docker
        state: started
        enabled: yes



- name: Master Node Setup
  hosts: master_nodes
  become: yes
  become_method: sudo
  gather_facts: yes
  vars:
    pod_network_cidr: 192.168.0.0/16
    custom_resource_remote_src: calico-custom-resource.yaml
    join_cluster_remote_src: /tmp/joincluster
  tasks:
    - name: Initialize kubernetes cluster
      command: kubeadm init --apiserver-advertise-address="{{ ansible_ssh_host }}" --apiserver-cert-extra-sans="{{ ansible_ssh_host }}" --node-name {{ ansible_hostname }} --pod-network-cidr={{ pod_network_cidr }}

    - name: Setup kubeconfig for {{ ansible_user }} user
      command: "{{ item }}"
      loop:
        - mkdir -p /home/{{ ansible_user }}/.kube
        - cp -i /etc/kubernetes/admin.conf /home/{{ ansible_user }}/.kube/config
        - chown {{ ansible_user }}:{{ ansible_user }} /home/{{ ansible_user }}/.kube/config

    - name: Install calico pod network
      become: false
      command: kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.3/manifests/tigera-operator.yaml
      register: install_calico_pod_network
    - name: Ensure calico-config directory exists
      file:
        path: calico-config
        state: directory
        mode: '0755'
      when: install_calico_pod_network is succeeded
    - name: Copy custom-resources.yaml to target machine
      copy:
        src: files/custom-resources.yaml
        dest: calico-config/custom-resources.yaml
      when: install_calico_pod_network is succeeded

    - name: Install Calico custom resources
      become: false
      command: kubectl create -f calico-config/custom-resources.yaml
      register: install_calico_custom_resource
      when: install_calico_pod_network is succeeded
    - name: Generate and save cluster join command
      command: kubeadm token create --print-join-command
      register: join_cluster_command
      when: install_calico_custom_resource is succeeded

    - name: Save join command to file
      template:
        src: joincluster.j2
        dest: "{{ join_cluster_remote_src }}"
      when: join_cluster_command is succeeded

    - name: Fetch joincluster into local file
      fetch:
        src: "{{ join_cluster_remote_src }}"
        dest: files/joincluster
        flat: yes
    - name: Ensure directory exists for local PV on worker-open5gs-01
      file:
        path: /mnt/data
        state: directory
        mode: '0777'
      delegate_to: worker-open5gs-01

    - name: Ensure directory exists for local PV on worker-open5gs-02
      file:
        path: /mnt/data
        state: directory
        mode: '0777'
      delegate_to: worker-open5gs-02

    - name: Create PersistentVolume configuration file
      copy:
        dest: persistent-vol-for-mongodb.yaml
        content: |
          apiVersion: v1
          kind: PersistentVolume
          metadata:
            name: local-pv-worker-01
            labels:
              project: open5gs
          spec:
            capacity:
              storage: 15Gi
            accessModes:
            - ReadWriteOnce
            persistentVolumeReclaimPolicy: Retain
            local:
              path: /mnt/data
            nodeAffinity:
              required:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                    - worker-open5gs-01
          ---
          apiVersion: v1
          kind: PersistentVolume
          metadata:
            name: local-pv-worker-02
            labels:
              project: open5gs
          spec:
            capacity:
              storage: 15Gi
            accessModes:
            - ReadWriteOnce
            persistentVolumeReclaimPolicy: Retain
            local:
              path: /mnt/data
            nodeAffinity:
              required:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                    - worker-open5gs-02

    - name: Apply PersistentVolume configuration
      command: kubectl apply -f persistent-vol-for-mongodb.yaml --validate=false --kubeconfig=/home/{{ ansible_user }}/.kube/config
    # Additional tasks and roles for Kubernetes setup




- name: Worker Node Setup
  hosts: worker_nodes
  become: yes
  become_method: sudo
  gather_facts: yes
  vars:
    join_cluster_remote_src: /tmp/joincluster
  tasks:
    - name: Copy the join command to server location
      copy:
        src: joincluster
        dest: "{{ join_cluster_remote_src }}"
        mode: 0777
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
    
    - name: Join the node to cluster
      command: sh {{ join_cluster_remote_src }}





